<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0c"/>
  <!-- subtle accent line -->
  <rect x="100" y="290" width="60" height="2" rx="1" fill="#c9a86c"/>
  <!-- name -->
  <text x="100" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#ededeb" letter-spacing="-1">Derek Cohen</text>
  <!-- title -->
  <text x="100" y="340" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="#7e7e84" letter-spacing="0.5">CTO at Trend Hunter</text>
  <!-- domain -->
  <text x="100" y="540" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="300" fill="#4a4a4e" letter-spacing="1">derekcohen.ca</text>
  <!-- decorative accent circle -->
  <circle cx="1060" cy="315" r="120" fill="none" stroke="#c9a86c" stroke-width="1" opacity="0.2"/>
  <circle cx="1060" cy="315" r="80" fill="none" stroke="#c9a86c" stroke-width="0.5" opacity="0.12"/>
  <!-- monogram inside circles -->
  <text x="1060" y="335" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="400" fill="#c9a86c" text-anchor="middle" opacity="0.6">DC</text>
</svg>
