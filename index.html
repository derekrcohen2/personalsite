<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derek Cohen</title>
    <meta name="description" content="Derek Cohen — personal site">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0e0e10;
            --surface: #16161a;
            --text: #e8e6e1;
            --text-dim: #8a8a8d;
            --accent: #c9a86c;
            --accent-dim: rgba(201, 168, 108, 0.12);
            --rule: rgba(255, 255, 255, 0.06);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 560px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .name {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.01em;
            color: var(--text);
            opacity: 0;
            animation: fadeUp 0.8s ease 0.1s forwards;
        }

        .title {
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-dim);
            margin-top: 0.6rem;
            letter-spacing: 0.02em;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        .rule {
            width: 48px;
            height: 1px;
            background: var(--accent);
            margin: 2.25rem 0;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .about {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.8;
            max-width: 480px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.4s forwards;
        }

        .links {
            display: flex;
            gap: 1.25rem;
            margin-top: 2.25rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            padding: 0.55rem 1.1rem;
            border: 1px solid var(--rule);
            border-radius: 6px;
            background: var(--surface);
            transition: border-color 0.3s ease, background 0.3s ease, color 0.3s ease;
        }

        .links a:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .links a svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 3rem 1.5rem;
                align-items: flex-start;
                padding-top: 6rem;
            }

            .links {
                flex-direction: column;
                gap: 0.75rem;
            }

            .links a {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <img src="profile.jpg" alt="Derek Cohen" class="avatar">

        <h1 class="name">Derek Cohen</h1>
        <p class="title">CTO at Trend Hunter</p>

        <div class="rule"></div>

        <p class="about">
            CTO at Trend Hunter, where I focus on building automation and AI software. When I'm not coding, you'll find me watching the NBA or MMA, gaming, or hunting down the best Taco Bell order.
        </p>

        <div class="links">
            <a href="https://www.linkedin.com/in/derekrcohen" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                    <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
                </svg>
                LinkedIn
            </a>
            <a href="https://github.com/derekrcohen2" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                </svg>
                GitHub
            </a>
        </div>
    </main>
</body>
</html>
